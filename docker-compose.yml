services:
  postgres-homelab:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hospital
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  hospital-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres-homelab:
        condition: service_healthy
